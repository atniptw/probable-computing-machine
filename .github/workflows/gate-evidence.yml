name: Gate Evidence Check

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

jobs:
  validate-gate-evidence:
    runs-on: ubuntu-latest
    steps:
      - name: Validate required PR sections
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          set -euo pipefail

          body="${PR_BODY:-}"

          require_text() {
            local needle="$1"
            if [[ "$body" != *"$needle"* ]]; then
              echo "Missing required section or marker: $needle"
              return 1
            fi
          }

          require_text "## Acceptance Criteria"
          require_text "## Decision Log"
          require_text "## QA Evidence"
          require_text "## Docs Impact"
          require_text "## Release and Rollback"

          echo "$body" | grep -Eqi -- "- \[[xX]\] I linked acceptance criteria\." || { echo "Missing checked item: acceptance criteria"; exit 1; }
          echo "$body" | grep -Eqi -- "- \[[xX]\] I linked decision evidence or justified none\." || { echo "Missing checked item: decision evidence"; exit 1; }
          echo "$body" | grep -Eqi -- "- \[[xX]\] I provided QA evidence\." || { echo "Missing checked item: QA evidence"; exit 1; }
          echo "$body" | grep -Eqi -- "- \[[xX]\] I described docs impact\." || { echo "Missing checked item: docs impact"; exit 1; }
          echo "$body" | grep -Eqi -- "- \[[xX]\] I documented rollback considerations\." || { echo "Missing checked item: rollback considerations"; exit 1; }

      - name: Validate decision reference or explicit exception
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          set -euo pipefail

          body="${PR_BODY:-}"

          if echo "$body" | grep -Eqi "DEC-[0-9]{4}|no new decision"; then
            echo "Decision evidence requirement satisfied."
          else
            echo "Provide DEC-XXXX reference or explicit 'no new decision' rationale in Decision Log section."
            exit 1
          fi
