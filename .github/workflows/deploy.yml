name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: Validate DECISIONS.md integrity
        run: |
          set -euo pipefail
          ids=$(grep -E '^## DEC-[0-9]{4}' DECISIONS.md | grep -oE '[0-9]{4}')
          dupes=$(echo "$ids" | sort | uniq -d)
          if [ -n "$dupes" ]; then
            echo "Duplicate DECISIONS.md IDs: $dupes"
            exit 1
          fi
          prev=99999
          while IFS= read -r id; do
            n=$((10#$id))
            if [ "$n" -ge "$prev" ]; then
              echo "DECISIONS.md not in descending order near DEC-$id (expected < $prev)"
              exit 1
            fi
            prev=$n
          done <<< "$ids"
          echo "DECISIONS.md integrity OK"
      - run: npm run lint
      - run: npm run format:check
      - run: npm run tsc
      - run: npm run test:coverage
      - name: Build
        run: npm run build
        env:
          VITE_BASE_PATH: /
          VITE_APP_URL: https://pokemon.pootzandboogie.com
          VITE_GITHUB_REPO: atniptw/probable-computing-machine
      - run: npx playwright install --with-deps chromium
      - run: npm run e2e
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
